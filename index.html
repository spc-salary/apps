<script>
    lucide.createIcons();
    let adminPass = "";

    function askPassword() { document.getElementById('passwordModal').classList.remove('hidden'); document.getElementById('adminPassInput').focus(); }
    function closePasswordModal() { document.getElementById('passwordModal').classList.add('hidden'); document.getElementById('adminPassInput').value = ''; }
   
    function submitPassword() {
        const p = document.getElementById('adminPassInput').value;
        if (!p) return;
        google.script.run.withSuccessHandler(function(isValid) {
            if (isValid) { adminPass = p; closePasswordModal(); document.getElementById('adminPanel').classList.remove('hidden'); document.getElementById('querySection').classList.add('hidden'); }
            else { alert("كلمة مرور خاطئة!"); }
        }).checkAdminAuth(p);
    }

    function toggleAdmin() { document.getElementById('adminPanel').classList.add('hidden'); document.getElementById('querySection').classList.remove('hidden'); }

    async function handleUpload() {
        const fileInput = document.getElementById('excelFile');
        const sheetName = document.getElementById('newSheetName').value.trim();
        const btn = document.getElementById('uploadBtn');
        if (!fileInput.files[0] || !sheetName) { alert("يرجى اختيار ملف وكتابة اسم الشيت"); return; }
        btn.disabled = true; btn.innerHTML = "جاري المعالجة...";
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1, defval: "" });
            google.script.run.withSuccessHandler(function(res) {
                btn.disabled = false; btn.innerHTML = `<i data-lucide="upload-cloud"></i> رفع البيانات ومعالجتها`;
                if (res.success) { alert("تم الرفع بنجاح!"); location.reload(); } else { alert("خطأ: " + res.error); }
            }).processUpload(jsonData, sheetName, adminPass);
        };
        reader.readAsArrayBuffer(fileInput.files[0]);
    }

    function fetchData() {
        const id = document.getElementById('nationalId').value.trim();
        const month = document.getElementById('monthSelect').value;
        const btn = document.getElementById('searchBtn');
        const btnContent = document.getElementById('btnContent');
        const btnLoader = document.getElementById('btnLoader');
        const res = document.getElementById('results');

        if (!id) { showError("يرجى إدخال الرقم الوطني"); return; }
        document.getElementById('errorMsg').classList.add('hidden');
        btn.disabled = true; btnContent.classList.add('hidden'); btnLoader.classList.remove('hidden');

        google.script.run.withSuccessHandler(function(data) {
            btn.disabled = false; btnContent.classList.remove('hidden'); btnLoader.classList.add('hidden');
            if (data.error) { showError(data.error === "error_id" ? "الرقم الوطني غير موجود" : "خطأ نظام"); res.classList.add('hidden'); return; }
            document.getElementById('resName').innerText = data.info[0].v;
            document.getElementById('resNet').innerText = data.netValue;
            document.getElementById('resDate').innerText = data.salaryDate;
            document.getElementById('infoList').innerHTML = data.info.map(i => `<div class="flex justify-between border-b border-slate-200 pb-2"><span class="text-slate-500 text-xs">${i.h}</span><span class="font-black text-slate-900">${i.v}</span></div>`).join('');
            fillTable('allowanceTable', data.allowances, 'text-emerald-700', 'allowanceSection');
            fillTable('deductionTable', data.deductions, 'text-rose-700', 'deductionSection');
            res.classList.remove('hidden'); res.scrollIntoView({ behavior: 'smooth' });
            lucide.createIcons();
        }).getResult(id, month);
    }

    function fillTable(tId, items, color, sId) {
        const table = document.getElementById(tId); const section = document.getElementById(sId);
        if (items.length === 0) { section.classList.add('hidden'); return; }
        section.classList.remove('hidden');
        table.innerHTML = items.map(item => `<tr><td class="px-6 py-4 text-sm font-bold text-slate-700">${item.name}</td><td class="px-6 py-4 text-sm font-black ${color} text-left">${item.val}</td></tr>`).join('');
    }

    function showError(msg) { document.getElementById('errorText').innerText = msg; document.getElementById('errorMsg').classList.remove('hidden'); lucide.createIcons(); }
</script>
</body>
