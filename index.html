<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة التصميم العشوائية</title>
    <style>
        :root {
            --primary-color: #10b981; /* لون أخضر حيوي */
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #0f172a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
            border: 1px solid #e2e8f0;
        }

        h1 { font-size: 1.6rem; margin-bottom: 0.5rem; color: var(--primary-color); }
        p { color: #64748b; margin-bottom: 1.5rem; font-size: 0.95rem; }

        .tool-card {
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 1.2rem;
            padding: 2rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }

        .tool-name { font-weight: bold; font-size: 1.4rem; display: block; margin-bottom: 0.8rem; color: #334155; }
        .tool-desc { font-size: 1rem; color: #475569; display: block; margin-bottom: 1.5rem; line-height: 1.6; }

        .btn {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 0.9rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.4);
            transition: all 0.2s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.5);
        }

        .refresh-hint {
            display: block;
            margin-top: 1.5rem;
            color: #94a3b8;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>اكتشف أداة جديدة</h1>
        <p>قم بتحديث الصفحة للحصول على أداة تصميم مجانية أخرى!</p>

        <div class="tool-card">
            <span id="tool-name" class="tool-name">...</span>
            <span id="tool-desc" class="tool-desc"></span>
            <a id="tool-link" href="#" target="_blank" class="btn">فتح الموقع</a>
        </div>

        <span class="refresh-hint" onclick="location.reload()">تحديث الصفحة يدويًا ↻</span>
    </div>

    <script>
        // قائمة بالأدوات المجانية التي تدعم العربية أو مفيدة جداً للمصممين
        const tools = [
            { name: "عرب فونتس", desc: "أكبر محرك بحث وتحميل للخطوط العربية المجانية.", link: "https://arbfonts.com" },
            { name: "ألوان مسطحة (Flat UI)", desc: "مجموعة أيقونات وألوان تدعم التصميم الحديث والمتناسق.", link: "https://flatuicolors.com" },
            { name: "خلفيات بيكسلز", desc: "صور ومقاطع فيديو مجانية عالية الدقة بواجهة عربية.", link: "https://www.pexels.com/ar-sa/" },
            { name: "إزالة الخلفية", desc: "أداة رائعة تعتمد على الذكاء الاصطناعي لحذف خلفية أي صورة.", link: "https://www.remove.bg/ar" },
            { name: "لوحات ألوان هانت", desc: "استلهم تناسق الألوان لمشروعك القادم من لوحات جاهزة.", link: "https://colorhunt.co" },
            { name: "موقع طارق تيك", desc: "يقدم أدوات ومصادر تقنية متنوعة تخدم المطورين العرب.", link: "https://tareqtech.com" },
            { name: "أيقونات FlatIcon", desc: "أكبر مستودع للأيقونات في العالم مع إمكانية البحث بالعربي.", link: "https://www.flaticon.com" },
            { name: "كانفا بالعربي", desc: "تصميم منشورات السوشيال ميديا بسهولة فائقة وخطوط عربية.", link: "https://www.canva.com/ar_eg/" },
            { name: "Freepik", desc: "ملفات مفتوحة المصدر (Vector) وتصاميم جاهزة للتعديل.", link: "https://www.freepik.com" },
            { name: "FontFace", desc: "أداة ممتازة لمعاينة وتجربة الخطوط العربية على المتصفح.", link: "https://fontface.ninja" }
        ];

        function getRandomTool() {
            // اختيار رقم عشوائي بناءً على طول المصفوفة
            const randomIndex = Math.floor(Math.random() * tools.length);
            const tool = tools[randomIndex];

            // تحديث واجهة المستخدم
            document.getElementById('tool-name').innerText = tool.name;
            document.getElementById('tool-desc').innerText = tool.desc;
            document.getElementById('tool-link').href = tool.link;
        }

        // تشغيل الوظيفة عند تحميل الصفحة
        window.onload = getRandomTool;
    </script>
</body>
</html>
