<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدير الإشارات المرجعية الذكي</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f5f9;
      --surface: #ffffff;
      --surface2: #f0f1f7;
      --border: #e2e4ee;
      --text: #1a1d2e;
      --text-muted: #7b80a0;
      --primary: #6c5ce7;
      --primary-light: #ede9ff;
      --primary-fg: #ffffff;
      --destructive: #e53e3e;
      --destructive-light: #fff5f5;
      --green: #38a169;
      --green-light: #f0fff4;
      --orange: #d97706;
      --orange-light: #fffbeb;
      --shadow: 0 2px 12px rgba(0,0,0,.07);
      --shadow-lg: 0 8px 30px rgba(0,0,0,.13);
      --radius: 14px;
      --radius-sm: 9px;
      --transition: .18s ease;
    }
    .dark {
      --bg: #10111a;
      --surface: #181926;
      --surface2: #1f2133;
      --border: #282c42;
      --text: #e8eaf6;
      --text-muted: #6b7090;
      --primary: #8b7ff0;
      --primary-light: #1e1a3a;
      --shadow: 0 2px 16px rgba(0,0,0,.35);
      --shadow-lg: 0 8px 32px rgba(0,0,0,.5);
    }

    body {
      font-family: 'Segoe UI', 'Tahoma', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
    }

    /* ======================== LAYOUT ======================== */
    .app { display: flex; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar {
      width: 240px; flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      position: sticky; top: 0; height: 100vh;
      overflow-y: auto;
    }
    .sidebar-header {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 9px; }
    .logo-icon {
      width: 34px; height: 34px;
      background: var(--primary);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 16px;
      box-shadow: 0 3px 10px rgba(108,92,231,.3);
      flex-shrink: 0;
    }
    .logo-text { font-size: 13px; font-weight: 700; line-height: 1.3; }
    .logo-sub { font-size: 10px; color: var(--text-muted); }

    .sidebar-section { padding: 12px 10px 6px; }
    .sidebar-section-title {
      font-size: 10px; font-weight: 700;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: .06em; padding: 0 6px; margin-bottom: 4px;
    }

    .cat-item {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
      user-select: none;
    }
    .cat-item:hover { background: var(--surface2); }
    .cat-item.active { background: var(--primary-light); color: var(--primary); }
    .cat-item.active .cat-count { background: var(--primary); color: #fff; }
    .cat-emoji { font-size: 15px; flex-shrink: 0; width: 20px; text-align: center; }
    .cat-name { flex: 1; font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cat-count {
      font-size: 10px; font-weight: 700;
      background: var(--surface2);
      color: var(--text-muted);
      padding: 1px 6px; border-radius: 20px; min-width: 20px; text-align: center;
    }
    .cat-del {
      display: none; width: 18px; height: 18px;
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 12px; border-radius: 4px;
      align-items: center; justify-content: center;
      transition: all var(--transition);
    }
    .cat-item:hover .cat-del { display: flex; }
    .cat-del:hover { background: var(--destructive-light); color: var(--destructive); }

    .add-cat-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer; color: var(--text-muted);
      font-size: 12px; font-weight: 500;
      transition: all var(--transition);
      border: 1.5px dashed var(--border);
      margin: 6px 0;
    }
    .add-cat-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

    /* Add category inline form */
    .add-cat-form {
      background: var(--surface2);
      border: 1.5px solid var(--primary);
      border-radius: var(--radius-sm);
      padding: 10px;
      margin: 4px 0 8px;
      display: none;
    }
    .add-cat-form.visible { display: block; }
    .emoji-row {
      display: flex; flex-wrap: wrap; gap: 4px;
      margin-bottom: 8px;
    }
    .emoji-btn {
      width: 30px; height: 30px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 7px; cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
    }
    .emoji-btn:hover, .emoji-btn.selected { border-color: var(--primary); background: var(--primary-light); }
    .cat-name-inp {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 7px;
      padding: 7px 10px;
      font-size: 12px; color: var(--text);
      outline: none; font-family: inherit;
      direction: rtl;
      margin-bottom: 8px;
    }
    .cat-name-inp:focus { border-color: var(--primary); }
    .cat-form-btns { display: flex; gap: 6px; }
    .btn-cat-save, .btn-cat-cancel {
      flex: 1; padding: 6px; border-radius: 7px;
      border: none; cursor: pointer; font-size: 12px; font-weight: 600;
      font-family: inherit; transition: all var(--transition);
    }
    .btn-cat-save { background: var(--primary); color: #fff; }
    .btn-cat-save:hover { opacity: .88; }
    .btn-cat-cancel { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); }
    .btn-cat-cancel:hover { color: var(--text); }

    /* Sidebar footer */
    .sidebar-footer {
      margin-top: auto;
      padding: 12px 10px;
      border-top: 1px solid var(--border);
    }
    .stats-row { display: flex; gap: 8px; }
    .stat-box {
      flex: 1; background: var(--primary-light);
      border-radius: 10px; padding: 10px 8px;
      text-align: center;
    }
    .stat-num { font-size: 18px; font-weight: 800; color: var(--primary); }
    .stat-label { font-size: 9px; color: var(--text-muted); margin-top: 1px; }

    /* MAIN */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    /* Top bar */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 10;
    }
    .topbar-title { font-size: 15px; font-weight: 700; flex-shrink: 0; }
    .topbar-title span { color: var(--primary); }
    .search-wrap { flex: 1; position: relative; }
    .search-icon {
      position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); pointer-events: none; font-size: 13px;
    }
    .search-input {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 34px 8px 32px;
      font-size: 13px; color: var(--text);
      outline: none; direction: rtl;
      transition: border-color var(--transition), box-shadow var(--transition);
      font-family: inherit;
    }
    .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(108,92,231,.1); }
    .search-clear-btn {
      position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--text-muted);
      font-size: 12px; display: none;
    }
    .search-clear-btn.vis { display: block; }
    .topbar-actions { display: flex; gap: 7px; flex-shrink: 0; }
    .btn-icon {
      width: 36px; height: 36px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 15px;
      transition: all var(--transition);
    }
    .btn-icon:hover { color: var(--text); background: var(--border); }

    /* Content area */
    .content { flex: 1; display: flex; gap: 0; min-width: 0; }

    /* Bookmarks area */
    .bookmarks-area { flex: 1; padding: 20px; min-width: 0; }
    .area-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .area-title { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 7px; }
    .area-title .emo { font-size: 16px; }
    .area-count {
      font-size: 11px; font-weight: 600;
      background: var(--surface2); color: var(--text-muted);
      padding: 2px 8px; border-radius: 20px;
    }

    .bookmarks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 12px;
    }

    .bookmark-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      transition: all var(--transition);
      animation: fadeUp .25s ease both;
      cursor: default;
    }
    .bookmark-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
    .bm-top { display: flex; align-items: flex-start; gap: 10px; }
    .bm-favicon {
      width: 36px; height: 36px; flex-shrink: 0;
      background: var(--surface2); border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: var(--text-muted); overflow: hidden;
    }
    .bm-favicon img { width: 20px; height: 20px; object-fit: contain; }
    .bm-info { flex: 1; min-width: 0; }
    .bm-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bm-url { font-size: 11px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; direction: ltr; text-align: right; }
    .bm-cat {
      display: inline-flex; align-items: center; gap: 3px;
      margin-top: 5px; font-size: 10px; font-weight: 600;
      padding: 2px 7px; border-radius: 20px;
      background: var(--primary-light); color: var(--primary);
    }
    .bm-actions {
      display: flex; gap: 3px;
      opacity: 0; transition: opacity var(--transition);
    }
    .bookmark-card:hover .bm-actions { opacity: 1; }
    .bm-btn {
      width: 26px; height: 26px;
      background: none; border: none; border-radius: 7px;
      cursor: pointer; font-size: 12px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); transition: all var(--transition);
    }
    .bm-btn:hover { background: var(--surface2); color: var(--text); }
    .bm-btn.del:hover { background: var(--destructive-light); color: var(--destructive); }
    .bm-time { font-size: 10px; color: var(--text-muted); margin-top: 10px; }

    /* Empty */
    .empty { grid-column: 1/-1; text-align: center; padding: 60px 20px; }
    .empty-icon { font-size: 38px; margin-bottom: 12px; }
    .empty h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .empty p { font-size: 13px; color: var(--text-muted); max-width: 280px; margin: 0 auto; line-height: 1.6; }

    /* RIGHT PANEL */
    .right-panel {
      width: 280px; flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      max-height: calc(100vh - 65px);
      overflow-y: auto;
      position: sticky; top: 65px;
    }

    /* Add form */
    .add-form-section { padding: 16px; border-bottom: 1px solid var(--border); }
    .section-hdr {
      display: flex; align-items: center; gap: 7px;
      margin-bottom: 12px;
    }
    .section-hdr-icon {
      width: 24px; height: 24px; background: var(--primary-light);
      border-radius: 7px; display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: var(--primary);
    }
    .section-hdr h3 { font-size: 13px; font-weight: 600; }

    .form-group { margin-bottom: 10px; }
    .form-label {
      font-size: 10px; font-weight: 700; color: var(--text-muted);
      display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em;
    }
    .inp-wrap { position: relative; }
    .form-inp {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 13px;
      font-size: 12px; color: var(--text); outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      font-family: inherit;
      direction: ltr; text-align: right;
    }
    .form-inp.rtl { direction: rtl; text-align: right; }
    .form-inp::placeholder { color: var(--text-muted); }
    .form-inp:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(108,92,231,.12); }
    .form-inp.err { border-color: var(--destructive); }
    .fetch-ico {
      position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
      pointer-events: none;
    }
    .form-inp.loading { padding-left: 30px; }
    .fetch-msg { font-size: 10px; margin-top: 3px; }
    .fetch-ok { color: var(--green); }
    .fetch-fail { color: var(--orange); }
    .form-err { font-size: 10px; color: var(--destructive); margin-top: 3px; }

    /* Category selector */
    .cat-select-wrap { position: relative; }
    .cat-select {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 13px;
      font-size: 12px; color: var(--text); outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      font-family: inherit;
      cursor: pointer;
      appearance: none;
      direction: rtl;
    }
    .cat-select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(108,92,231,.12); }
    .select-arrow {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      pointer-events: none; font-size: 10px; color: var(--text-muted);
    }

    .btn-submit {
      width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      background: var(--primary); color: #fff;
      border: none; border-radius: var(--radius-sm);
      padding: 10px; font-size: 12px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: all var(--transition); margin-top: 4px;
    }
    .btn-submit:hover { opacity: .88; transform: translateY(-1px); }
    .btn-submit:active { transform: scale(.98); }
    .btn-submit:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    /* Suggestions */
    .suggestions-section { flex: 1; padding: 0; }
    .sug-hdr {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(135deg, rgba(108,92,231,.05), transparent);
    }
    .sug-hdr-left { display: flex; align-items: center; gap: 7px; }
    .sug-hdr-icon {
      width: 24px; height: 24px; background: var(--primary-light);
      border-radius: 7px; display: flex; align-items: center; justify-content: center;
      font-size: 11px;
    }
    .sug-hdr h3 { font-size: 12px; font-weight: 600; }
    .sug-hdr p { font-size: 10px; color: var(--text-muted); }
    .btn-sug-close {
      width: 22px; height: 22px; background: none; border: none;
      cursor: pointer; color: var(--text-muted); border-radius: 6px;
      font-size: 12px; display: flex; align-items: center; justify-content: center;
    }
    .btn-sug-close:hover { background: var(--surface2); color: var(--text); }

    .sug-item {
      display: flex; align-items: center; gap: 9px;
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
    }
    .sug-item:last-of-type { border-bottom: none; }
    .sug-item:hover { background: var(--surface2); }
    .sug-fav {
      width: 30px; height: 30px; flex-shrink: 0;
      background: var(--surface2); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: var(--text-muted); overflow: hidden;
    }
    .sug-fav img { width: 17px; height: 17px; object-fit: contain; }
    .sug-info { flex: 1; min-width: 0; }
    .sug-name { font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sug-desc { font-size: 10px; color: var(--text-muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn-add-sug {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 3px;
      padding: 4px 9px; border-radius: 7px; border: none; cursor: pointer;
      font-size: 10px; font-weight: 700;
      background: var(--primary); color: #fff;
      transition: all var(--transition); font-family: inherit;
    }
    .btn-add-sug:hover { opacity: .85; }
    .btn-add-sug.added { background: var(--green-light); color: var(--green); }

    .sug-placeholder {
      padding: 24px 16px; text-align: center;
      color: var(--text-muted); font-size: 12px; line-height: 1.7;
    }
    .sug-placeholder .phi { font-size: 24px; margin-bottom: 8px; opacity: .4; }
    .sug-footer { padding: 8px 14px; font-size: 9px; color: var(--text-muted); text-align: center; border-top: 1px solid var(--border); background: var(--surface2); }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px;
    }
    .sk-row { display: flex; align-items: center; gap: 9px; padding: 9px 14px; border-bottom: 1px solid var(--border); }
    .sk-c { width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0; }
    .sk-l { flex: 1; }
    .sk-ln { height: 9px; margin-bottom: 4px; }
    .sk-b { width: 48px; height: 24px; border-radius: 7px; flex-shrink: 0; }

    /* Spinner */
    .spin {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: rot .7s linear infinite; display: inline-block;
    }
    .spin-sm {
      width: 12px; height: 12px;
      border: 2px solid rgba(108,92,231,.25); border-top-color: var(--primary);
      border-radius: 50%; animation: rot .7s linear infinite; display: inline-block;
    }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--text); color: var(--bg);
      padding: 8px 18px; border-radius: 30px; font-size: 12px; font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,.18);
      transition: transform .3s ease, opacity .3s ease; opacity: 0; z-index: 999;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* Animations */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes rot { to { transform: rotate(360deg); } }

    /* Mobile */
    @media (max-width: 900px) {
      .right-panel { width: 240px; }
    }
    @media (max-width: 700px) {
      .app { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: static; flex-direction: row; flex-wrap: wrap; overflow: visible; border-left: none; border-bottom: 1px solid var(--border); }
      .sidebar-header { border-bottom: none; }
      .sidebar-section { display: flex; flex-wrap: wrap; gap: 4px; padding: 8px; }
      .cat-item { padding: 5px 9px; font-size: 12px; }
      .cat-del { display: none !important; }
      .sidebar-footer { display: none; }
      .right-panel { width: 100%; position: static; max-height: none; border-right: none; border-top: 1px solid var(--border); }
      .content { flex-direction: column-reverse; }
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  </style>
</head>
<body>

<div class="app">

  <!-- ========== SIDEBAR: CATEGORIES ========== -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">🔖</div>
        <div>
          <div class="logo-text">الإشارات الذكية</div>
          <div class="logo-sub">AI-Powered Bookmarks</div>
        </div>
      </div>
      <button class="btn-icon" id="btn-theme" onclick="toggleTheme()" title="الوضع الليلي" style="width:30px;height:30px;font-size:13px;">🌙</button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-title">المجلدات</div>

      <!-- All -->
      <div class="cat-item active" id="cat-all" onclick="selectCat('__all__')">
        <span class="cat-emoji">📚</span>
        <span class="cat-name">جميع الإشارات</span>
        <span class="cat-count" id="count-all">٠</span>
      </div>

      <!-- Dynamic categories -->
      <div id="cats-list"></div>

      <!-- Add category button -->
      <div class="add-cat-btn" onclick="toggleAddCatForm()">
        <span>＋</span> إضافة تصنيف جديد
      </div>

      <!-- Inline add form -->
      <div class="add-cat-form" id="add-cat-form">
        <div class="emoji-row" id="emoji-row"></div>
        <input class="cat-name-inp" id="new-cat-name" type="text" placeholder="اسم التصنيف..." maxlength="30" />
        <div class="cat-form-btns">
          <button class="btn-cat-save" onclick="saveNewCat()">حفظ</button>

const DEFAULT_CATS = [

  { id: 'design',   emoji: '🎨', name: 'تصميم وصور' },
  { id: 'social',   emoji: '📱', name: 'تواصل اجتماعي' },
  { id: 'reading',  emoji: '📖', name: 'قراءة ومراجع' },
  { id: 'tools',    emoji: '🔧', name: 'أدوات وإنتاجية' },
  { id: 'sports',   emoji: '⚽', name: 'رياضة' },
  { id: 'travel',   emoji: '✈️', name: 'سفر وسياحة' },
  { id: 'finance',  emoji: '💰', name: 'مال وأعمال' },
];

const EMOJI_CHOICES = ['📁','⭐','🔖','🌐','🏠','🎯','💡','📌','🚀','🔥','💎','🎁','📦','🛠','🧩','🎪','🌟','💫','🎭','📊','🎤','🍕','🌍','🏆','🔑'];

// ================================================================
// STORAGE
// ================================================================
function loadBookmarks() {
  try { return JSON.parse(localStorage.getItem(BM_KEY) || '[]'); } catch { return []; }
}
function saveBookmarks(list) { localStorage.setItem(BM_KEY, JSON.stringify(list)); }
function addBookmarkItem(bm) {
  const list = loadBookmarks();
  const item = { ...bm, id: crypto.randomUUID(), addedAt: Date.now() };
  saveBookmarks([item, ...list]);
  return item;
}
function deleteBookmarkItem(id) { saveBookmarks(loadBookmarks().filter(b => b.id !== id)); }

function loadCategories() {
  try {
    const stored = localStorage.getItem(CAT_KEY);
    if (stored) return JSON.parse(stored);
  } catch {}
  localStorage.setItem(CAT_KEY, JSON.stringify(DEFAULT_CATS));
  return DEFAULT_CATS;
}
function saveCategories(list) { localStorage.setItem(CAT_KEY, JSON.stringify(list)); }
function addCategory(cat) {
  const list = loadCategories();
  list.push(cat);
  saveCategories(list);
}
function deleteCategory(id) { saveCategories(loadCategories().filter(c => c.id !== id)); }

function getFavicon(url) {
  try { return `https://www.google.com/s2/favicons?domain=${new URL(normalizeUrl(url)).hostname}&sz=32`; }
  catch { return ''; }
}
function normalizeUrl(u) {
  if (!u) return '';
  return (u.startsWith('http://') || u.startsWith('https://')) ? u : 'https://' + u;
}

// ================================================================
// THEME
// ================================================================
let currentTheme = localStorage.getItem(THEME_KEY) ||
  (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
function applyTheme() {
  document.documentElement.classList.toggle('dark', currentTheme === 'dark');
  document.getElementById('btn-theme').textContent = currentTheme === 'dark' ? '☀️' : '🌙';
}
function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  localStorage.setItem(THEME_KEY, currentTheme);
  applyTheme();
}
applyTheme();

// ================================================================
// CATEGORY MANAGEMENT UI
// ================================================================
let selectedCat = '__all__';
let selectedEmoji = '📁';
let catFormVisible = false;

function buildEmojiRow() {
  const row = document.getElementById('emoji-row');
  row.innerHTML = EMOJI_CHOICES.map(e =>
    `<button type="button" class="emoji-btn${e === selectedEmoji ? ' selected' : ''}"
      onclick="pickEmoji('${e}',this)">${e}</button>`
  ).join('');
}

function pickEmoji(e, btn) {
  selectedEmoji = e;
  document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function toggleAddCatForm() {
  catFormVisible = !catFormVisible;
  const form = document.getElementById('add-cat-form');
  form.classList.toggle('visible', catFormVisible);
  if (catFormVisible) {
    selectedEmoji = '📁';
    buildEmojiRow();
    document.getElementById('new-cat-name').value = '';
    document.getElementById('new-cat-name').focus();
  }
}

function saveNewCat() {
  const name = document.getElementById('new-cat-name').value.trim();
  if (!name) { document.getElementById('new-cat-name').focus(); return; }
  const id = 'custom_' + Date.now();
  addCategory({ id, emoji: selectedEmoji, name });
  catFormVisible = false;
  document.getElementById('add-cat-form').classList.remove('visible');
  renderSidebar();
  renderCatSelect();
  showToast(`تم إنشاء تصنيف "${name}"`);
}

function deletecat(id, name, e) {
  e.stopPropagation();
  const bms = loadBookmarks();
  const count = bms.filter(b => b.catId === id).length;
  const msg = count > 0
    ? `هل تريد حذف تصنيف "${name}"؟\nيحتوي على ${toAr(count)} إشارة — ستُبقى الإشارات بدون تصنيف.`
    : `هل تريد حذف تصنيف "${name}"؟`;
  if (!confirm(msg)) return;
  deleteCategory(id);
  // Remove catId from affected bookmarks
  if (count > 0) {
    const updated = bms.map(b => b.catId === id ? { ...b, catId: '' } : b);
    saveBookmarks(updated);
  }
  if (selectedCat === id) selectCat('__all__');
  else { renderSidebar(); renderCatSelect(); renderBookmarks(); }
  showToast(`تم حذف التصنيف`);
}

function selectCat(id) {
  selectedCat = id;
  renderSidebar();
  renderBookmarks();
  // Update topbar title
  if (id === '__all__') {
    document.getElementById('topbar-title').textContent = 'جميع الإشارات';
    document.getElementById('area-emo').textContent = '📚';
    document.getElementById('area-name').textContent = 'جميع الإشارات';
  } else {
    const cat = loadCategories().find(c => c.id === id);
    if (cat) {
      document.getElementById('topbar-title').textContent = cat.emoji + ' ' + cat.name;
      document.getElementById('area-emo').textContent = cat.emoji;
      document.getElementById('area-name').textContent = cat.name;
    }
  }
}

function renderSidebar() {
  const cats = loadCategories();
  const bms = loadBookmarks();
  const allCount = bms.length;

  document.getElementById('count-all').textContent = toAr(allCount);
  document.getElementById('cat-all').classList.toggle('active', selectedCat === '__all__');

  const list = document.getElementById('cats-list');
  list.innerHTML = cats.map(c => {
    const cnt = bms.filter(b => b.catId === c.id).length;
    return `
      <div class="cat-item${selectedCat === c.id ? ' active' : ''}" onclick="selectCat('${c.id}')">
        <span class="cat-emoji">${c.emoji}</span>
        <span class="cat-name">${escHtml(c.name)}</span>
        <span class="cat-count">${toAr(cnt)}</span>
        <button class="cat-del" onclick="deletecat('${c.id}','${escHtml(c.name)}',event)" title="حذف">✕</button>
      </div>`;
  }).join('');

  // Stats
  const cats2 = new Set(bms.map(b => b.catId).filter(Boolean));
  document.getElementById('stat-total').textContent = toAr(allCount);
  document.getElementById('stat-cats').textContent = toAr(cats.length);
  document.getElementById('btn-clear-all').style.display = allCount > 0 ? 'flex' : 'none';
  document.getElementById('search-input').placeholder = `ابحث في ${toAr(allCount)} إشارة...`;
}

function renderCatSelect() {
  const cats = loadCategories();
  const sel = document.getElementById('inp-cat');
  const cur = sel.value;
  sel.innerHTML = `<option value="">— بدون تصنيف —</option>` +
    cats.map(c => `<option value="${c.id}">${c.emoji} ${escHtml(c.name)}</option>`).join('');
  // Restore value if still valid
  if (cur && cats.find(c => c.id === cur)) sel.value = cur;
  // Pre-select current filter if not "all"
  if (selectedCat !== '__all__' && cats.find(c => c.id === selectedCat)) sel.value = selectedCat;
}

// ================================================================
// AUTO FETCH TITLE
// ================================================================
let fetchTimer = null;
let lastFetchedUrl = '';

function isValidUrl(u) {
  try { new URL(u.startsWith('http') ? u : 'https://' + u); return true; }
  catch { return false; }
}

async function fetchSiteTitle(url) {
  try {
    const apiUrl = `https://api.microlink.io/?url=${encodeURIComponent(url)}&palette=false&audio=false&video=false&screenshot=false`;
    const res = await fetch(apiUrl, { signal: AbortSignal.timeout(6000) });
    if (!res.ok) throw new Error('fail');
    const json = await res.json();
    if (json.status === 'success' && json.data?.title) return json.data.title.trim();
    throw new Error('no title');
  } catch {
    try {
      const h = new URL(url).hostname.replace('www.','').split('.');
      return h[0].charAt(0).toUpperCase() + h[0].slice(1);
    } catch { return ''; }
  }
}

function onUrlInput() {
  clearTimeout(fetchTimer);
  const raw = document.getElementById('inp-url').value.trim();
  document.getElementById('fetch-msg').innerHTML = '';
  document.getElementById('fetch-ico').innerHTML = '';
  document.getElementById('inp-url').classList.remove('loading', 'err');
  document.getElementById('err-url').textContent = '';
  if (!raw || !isValidUrl(raw)) return;
  const url = normalizeUrl(raw);
  if (url === lastFetchedUrl) return;
  fetchTimer = setTimeout(() => doFetch(url), 700);
}

function onUrlBlur() {
  clearTimeout(fetchTimer);
  const raw = document.getElementById('inp-url').value.trim();
  if (!raw || !isValidUrl(raw)) return;
  const url = normalizeUrl(raw);
  if (url === lastFetchedUrl) return;
  doFetch(url);
}

async function doFetch(url) {
  lastFetchedUrl = url;
  document.getElementById('fetch-ico').innerHTML = '<span class="spin-sm"></span>';
  document.getElementById('inp-url').classList.add('loading');
  const title = await fetchSiteTitle(url);
  document.getElementById('fetch-ico').innerHTML = '';
  document.getElementById('inp-url').classList.remove('loading');
  if (title) {
    if (!document.getElementById('inp-name').value.trim())
      document.getElementById('inp-name').value = title;
    document.getElementById('fetch-msg').innerHTML = `<span class="fetch-ok">✓ تم جلب الاسم: ${escHtml(title)}</span>`;
  } else {
    document.getElementById('fetch-msg').innerHTML = `<span class="fetch-fail">⚠ تعذّر جلب الاسم تلقائياً</span>`;
  }
}

};

function detectDbCat(url, name) {
  try {
    const h = new URL(normalizeUrl(url)).hostname.replace('www.','');
    if (DOMAIN_TO_CAT[h]) return DOMAIN_TO_CAT[h];
  } catch {}
  const s = (url + ' ' + name).toLowerCase();
  if (/ai|openai|claude|gemini|gpt|ذكاء|llm/.test(s)) return 'ai';
  if (/news|أخبار|journal|times|post/.test(s)) return 'news';
  if (/tech|code|dev|git|برمجة|تقنية/.test(s)) return 'tech';
  if (/movie|film|series|أفلام|مسلسل/.test(s)) return 'movies';
  if (/learn|course|edu|تعليم|دورة/.test(s)) return 'edu';
  if (/shop|store|buy|تسوق|market/.test(s)) return 'shop';
  if (/music|song|موسيقى|audio/.test(s)) return 'music';
  if (/game|ألعاب|steam|play/.test(s)) return 'games';
  if (/design|art|creative|تصميم/.test(s)) return 'design';
  if (/social|تواصل|chat/.test(s)) return 'social';
  if (/read|wiki|book|قراءة/.test(s)) return 'reading';
  if (/sport|كورة|رياضة|football/.test(s)) return 'sports';
  if (/travel|سفر|hotel|flight/.test(s)) return 'travel';
  if (/finance|money|مال|stock/.test(s)) return 'finance';
  return 'default';
}

function shuffle(a) {
  const b = [...a];
  for (let i = b.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [b[i],b[j]] = [b[j],b[i]];
  }
  return b;
}

async function discoverSimilar(url, name) {
  await new Promise(r => setTimeout(r, 850 + Math.random()*600));
  const cat = detectDbCat(url, name);
  const pool = SIMILAR_DB[cat] || SIMILAR_DB.default;
  let host = '';
  try { host = new URL(normalizeUrl(url)).hostname.replace('www.',''); } catch {}
  return shuffle(pool.filter(s => {
    try { return new URL(s.url).hostname.replace('www.','') !== host; }
    catch { return true; }
  })).slice(0,5);
}

function toAr(n) { return String(n).replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]); }
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function timeAgo(ts) {
  const d = Date.now()-ts, m=Math.floor(d/60000), h=Math.floor(d/3600000), dy=Math.floor(d/86400000);
  if (m<1) return 'الآن';
  if (m<60) return `منذ ${toAr(m)} د`;
  if (h<24) return `منذ ${toAr(h)} س`;
  return `منذ ${toAr(dy)} يوم`;
}
function displayHost(url) {
  try { return new URL(url).hostname.replace('www.',''); } catch { return url; }
}

function renderBookmarks() {
  const grid = document.getElementById('bookmarks-grid');
  const bms = loadBookmarks();
  const q = searchQuery.trim().toLowerCase();

  let filtered = selectedCat === '__all__' ? bms : bms.filter(b => b.catId === selectedCat);
  if (q) filtered = filtered.filter(b =>
    b.name.toLowerCase().includes(q) ||
    b.url.toLowerCase().includes(q)
  );

  document.getElementById('area-count').textContent = toAr(filtered.length) + ' إشارة';

  if (filtered.length === 0) {
    const isSearch = q.length > 0;
    const isCatEmpty = !isSearch && selectedCat !== '__all__' && bms.filter(b=>b.catId===selectedCat).length===0;
    grid.innerHTML = `
      <div class="empty">
        <div class="empty-icon">${isSearch ? '🔍' : '📌'}</div>
        <h3>${isSearch ? 'لا توجد نتائج' : 'هذا المجلد فارغ'}</h3>
        <p>${isSearch
          ? `لا إشارات تطابق "${escHtml(searchQuery)}"`
          : 'أضف إشارة وحدد هذا التصنيف لها عند الإضافة'
        }</p>
      </div>`;
    return;
  }

  const cats = loadCategories();
  grid.innerHTML = filtered.map((b, i) => {
    const cat = cats.find(c => c.id === b.catId);
    return `
    <div class="bookmark-card" style="animation-delay:${i*30}ms">
      <div class="bm-top">
        <div class="bm-favicon">
          ${b.favicon
            ? `<img src="${escHtml(b.favicon)}" alt="" onerror="this.parentElement.textContent='${escHtml(b.name.charAt(0).toUpperCase())}'">` 
            : escHtml(b.name.charAt(0).toUpperCase())}
        </div>
        <div class="bm-info">
          <div class="bm-name" title="${escHtml(b.name)}">${escHtml(b.name)}</div>
          <div class="bm-url">${escHtml(displayHost(b.url))}</div>
          ${cat ? `<span class="bm-cat">${cat.emoji} ${escHtml(cat.name)}</span>` : ''}
        </div>
        <div class="bm-actions">
          <a href="${escHtml(b.url)}" target="_blank" rel="noopener" class="bm-btn" title="فتح">↗</a>
          <button class="bm-btn del" onclick="handleDelete('${b.id}')" title="حذف">🗑</button>
        </div>
      </div>
      <div class="bm-time">🕐 ${timeAgo(b.addedAt)}</div>
    </div>`;
  }).join('');
}

let lastSuggs = [];
let lastSrcUrl = '';

async function handleAdd(e) {
  e.preventDefault();
  clearTimeout(fetchTimer);

  const urlVal  = document.getElementById('inp-url').value.trim();
  const nameVal = document.getElementById('inp-name').value.trim();
  const catVal  = document.getElementById('inp-cat').value;

  // Validate
  let ok = true;
  document.getElementById('err-url').textContent = '';
  document.getElementById('err-name').textContent = '';
  document.getElementById('inp-url').classList.remove('err');
  document.getElementById('inp-name').classList.remove('err');

  if (!urlVal) {
    document.getElementById('err-url').textContent = 'الرابط مطلوب';
    document.getElementById('inp-url').classList.add('err'); ok = false;
  } else if (!isValidUrl(urlVal)) {
    document.getElementById('err-url').textContent = 'رابط غير صحيح';
    document.getElementById('inp-url').classList.add('err'); ok = false;
  }
  if (!nameVal) {
    document.getElementById('err-name').textContent = 'الاسم مطلوب';
    document.getElementById('inp-name').classList.add('err'); ok = false;
  }
  if (!ok) return;

  const url = normalizeUrl(urlVal);
  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> جارٍ الاكتشاف...';

  addedSuggestions.clear();
  addBookmarkItem({ name: nameVal, url, favicon: getFavicon(url), catId: catVal });
  renderSidebar();
  renderBookmarks();

  // Reset form
  document.getElementById('inp-url').value = '';
  document.getElementById('inp-name').value = '';
  document.getElementById('fetch-msg').innerHTML = '';
  document.getElementById('fetch-ico').innerHTML = '';
  lastFetchedUrl = '';

  // If we're in a category, pre-select it again
  if (selectedCat !== '__all__') {
    const cats = loadCategories();
    if (cats.find(c => c.id === selectedCat)) document.getElementById('inp-cat').value = selectedCat;
  }

  lastSrcUrl = url;
  renderSkeletonSuggs(displayHost(url));

  try {
    const results = await discoverSimilar(url, nameVal);
    lastSuggs = results;
    renderSuggestions(results, url);
  } catch {
    dismissSuggestions();
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span>+</span> إضافة الإشارة';
  }
}

function handleDelete(id) {
  deleteBookmarkItem(id);
  renderSidebar();
  renderBookmarks();
  showToast('تم حذف الإشارة');
}

function clearAll() {
  if (!confirm('هل تريد حذف جميع الإشارات؟ لا يمكن التراجع عن هذا الإجراء.')) return;
  localStorage.removeItem(BM_KEY);
  renderSidebar();
  renderBookmarks();

}

function handleSearch() {

}

}

function renderSuggestions(results, srcUrl) {
  const host = displayHost(srcUrl);
  if (!results || results.length === 0) {
    document.getElementById('suggestions-section').innerHTML = `<div class="sug-placeholder"><div class="phi">🌐</div>لا توجد اقتراحات</div>`;
    return;
  }
  const cats = loadCategories();
  document.getElementById('suggestions-section').innerHTML = `
    <div class="sug-hdr">
      <div class="sug-hdr-left">
        <div class="sug-hdr-icon">✨</div>
        <div><h3>اقتراحات ذكية</h3><p>مشابه لـ ${escHtml(host)}</p></div>
      </div>
      <button class="btn-sug-close" onclick="dismissSuggestions()">✕</button>
    </div>
    ${results.map((s,i) => {
      const fh = (() => { try { return new URL(s.url).hostname; } catch { return ''; } })();
      const bid = 'sb'+i;
      const matchCat = cats.find(c => c.id === s.cat);
      return `
      <div class="sug-item" style="animation-delay:${i*50}ms">
        <div class="sug-fav">
          <img src="https://www.google.com/s2/favicons?domain=${fh}&sz=32" alt="" onerror="this.parentElement.textContent='${escHtml(s.name.charAt(0))}'">
        </div>
        <div class="sug-info">
          <div class="sug-name">${escHtml(s.name)}</div>
          <div class="sug-desc">${escHtml(s.desc)}</div>
        </div>
        <button class="btn-add-sug ${addedSuggestions.has(s.url)?'added':''}"
          id="${bid}"
          data-url="${escHtml(s.url)}"
          data-name="${escHtml(s.name)}"
          data-cat="${escHtml(s.cat)}"
          onclick="addSuggestion(this)">
          ${addedSuggestions.has(s.url) ? '✓ تمت' : '+ إضافة'}
        </button>
      </div>`;
    }).join('')}
    <div class="sug-footer">يعمل بمحرك الاكتشاف الذكي</div>`;
}

function dismissSuggestions() {
  addedSuggestions.clear();
  document.getElementById('suggestions-section').innerHTML = `
    <div class="sug-placeholder">
      <div class="phi">✨</div>
      أضف إشارة لترى اقتراحات المواقع المشابهة
    </div>`;
}

function addSuggestion(btn) {
  const url   = btn.dataset.url;
  const name  = btn.dataset.name;
  const catId = btn.dataset.cat;
  const normUrl = normalizeUrl(url);
  // use current selected cat if available, else use detected cat
  const finalCat = selectedCat !== '__all__' ? selectedCat : catId;
  addBookmarkItem({ name, url: normUrl, favicon: getFavicon(normUrl), catId: finalCat });
  addedSuggestions.add(url);
  renderSidebar();
  renderBookmarks();
  btn.classList.add('added');
  btn.textContent = '✓ تمت';
  showToast(`تمت إضافة "${name}"`);
}

  t.classList.add('show');
