<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>YouTube Fullscreen</title>

<style>
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: black;
    }

    .video-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }

    .close-btn {
        position: absolute;
        top: 15px;
        right: 15px;
        background: rgba(0,0,0,0.7);
        color: white;
        border: none;
        font-size: 18px;
        padding: 10px 15px;
        border-radius: 8px;
        cursor: pointer;
        z-index: 999;
    }
</style>

</head>
<body>

<div class="video-container">
    
    <button class="close-btn" onclick="closeVideo()">✕</button>

    <iframe 
        src="https://www.youtube.com/embed/VIDEO_ID?autoplay=1&controls=1"
        allow="autoplay; encrypted-media"
        allowfullscreen>
    </iframe>

</div>

<script>
function closeVideo() {
    // يرجع للصفحة السابقة
    if (window.history.length > 1) {
        window.history.back();
    } else {
        // أو يخفي الفيديو
        document.body.innerHTML = "";
    }
}
</script>

</body>
</html>
