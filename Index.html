<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملاحظاتي المتقدمة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; }
        .header-bg {
            background: linear-gradient(135deg, #673ab7, #9575cd);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }
        .nav-tabs { border-bottom: none; justify-content: center; margin-top: -20px; }
        .nav-link { 
            background: white !important; 
            margin: 0 5px; 
            border-radius: 20px !important; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            color: #673ab7;
        }
        .nav-link.active { background: #673ab7 !important; color: white !important; }
        .note-card {
            border: none;
            border-radius: 15px;
            margin-bottom: 15px;
            transition: transform 0.2s;
        }
        .note-card:hover { transform: scale(1.02); }
        .fab {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background-color: #673ab7;
            color: white;
            border-radius: 30px;
            padding: 10px 25px;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: none;
        }
    </style>
</head>
<body>

<div class="header-bg">
    <h2 class="fw-bold">ملاحظاتي المتقدمة</h2>
</div>

<ul class="nav nav-tabs mb-4" id="myTab" role="tablist">
    <li class="nav-item">
        <button class="nav-link active" id="all-tab" data-bs-toggle="tab" data-bs-target="#all">الكل</button>
    </li>
    <li class="nav-item">
        <button class="nav-link" id="work-tab" data-bs-toggle="tab" data-bs-target="#work">العمل</button>
    </li>
</ul>

<div class="container mt-4">
    <div class="tab-content" id="myTabContent">
        <div class="tab-pane fade show active" id="all">
            <div id="notesList">
                </div>
        </div>
        <div class="tab-pane fade" id="work">
            <p class="text-center text-muted">لا توجد مهام عمل حالياً</p>
        </div>
    </div>
</div>

<button class="fab" onclick="addNote()">
    <i class="bi bi-pencil-square"></i> ملاحظة جديدة
</button>

<script>
    let notes = [
        { id: 1, title: 'خطة المشروع', content: 'إنهاء تصميم الواجهات قبل نهاية الأسبوع.', color: '#fff3cd' }
    ];

    function renderNotes() {
        const list = document.getElementById('notesList');
        list.innerHTML = '';
        notes.forEach((note, index) => {
            list.innerHTML += `
                <div class="card note-card" style="background-color: ${note.color}">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h5 class="fw-bold">${note.title}</h5>
                            <p class="mb-1">${note.content}</p>
                            <small class="text-muted">${new Date().toLocaleTimeString('ar-EG')}</small>
                        </div>
                        <button class="btn btn-outline-danger btn-sm" onclick="deleteNote(${index})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </div>
            `;
        });
    }

    function addNote() {
        const newNote = {
            id: Date.now(),
            title: 'ملاحظة جديدة',
            content: 'محتوى ملاحظة ذكية من الويب...',
            color: '#e3f2fd'
        };
        notes.push(newNote);
        renderNotes();
    }

    function deleteNote(index) {
        notes.splice(index, 1);
        renderNotes();
    }

    // تشغيل العرض الأول
    renderNotes();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
